<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliz Cumpleaños Karen</title>
  <style>
    body {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      text-align: center;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20%;
      font-size: 3em;
      animation: bounce 1.5s infinite;
    }

    p {
      font-size: 1.5em;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
  </style>
</head>
<body>
  <h1>🎉 Feliz Cumpleaños Karen 🎂</h1>
  <p>Que tengas un día increíble :D</p>
</body>
</html>
